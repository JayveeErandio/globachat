<head>
	<title>GlobaChat</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
	@font-face {
		font-family: archivo;
		src: url(font.ttf);
	}
	* {
		margin: 0;
		font-family: archivo;
	}
	body > img {
		filter: blur(12px);
		width: 100%;
		height: 100%;
		object-fit: cover;
		object-position: center;
		scale: 110%;
		z-index: -1;
		position: fixed;
		left: 0%;
	}
	.colTheme1 {
		background: #fff;
	}
	.colTheme2 {
		background: #ddd;
	}
	.texTheme1 {
		color: #333;
	}
	#mobileView > .header {
		border-radius: 0px 0px 20px 20px;
		position: fixed;
		padding: 12px;
		width: 100%;
		box-sizing: border-box;
		z-index: 1;
	}
	#mobileView .logoContainer {
		width: 100%;
		margin-bottom: 12px;
	}
	.logo {
		width: 30px;
		float: left;
		margin-right: 5px;
	}
	.logoContainer {
		display: flex;
		font-weight: bold;
		font-size: 140%;
	}
	.logoContainer p {
		width: min-content;
		float: left;
		display: flex;
		align-items: center;
	}
	.logoContainer p:nth-child(2) {color: #0a4}
	.logoContainer p:last-child {color: #26a}
	.navBar {
		border-radius: 100px;
		padding-top: 5px;
		padding-bottom: 5px;
		position: relative;
	}
	.navBar > div {
		display: flex;
	}
	.navBar > div p {
		flex: 1;
		display: flex;
		justify-content: center;
		font-weight: bold;
		height: auto;
		z-index: 1;
	}
	.tabHead {
		height: 100%;
		position: absolute;
		top: 0%;
		width: 25%;
		left: 25%;
		border-radius: 100px;
		z-index: 0;
		transform: scale(0.9, 0.8);
		transition: left 0.2s;
	}
	.chatType {
		position: fixed;
		bottom: 0%;
		margin: 24px;
		width: calc(100% - 48px);
		display: flex;
		border-radius: 7px;
		align-items: stretch;
		box-shadow: 0px -7px 20px rgba(0, 0, 0, 0.5);
	}
	.chatType button {
		width: 60px;
		border-radius: 7px;
		padding: 5px;
		height: 52px;
	}
	.chatType button:active {
		filter: brightness(85%);
	}
	.chatType img {
		width: 20px;
		filter: invert(1);
	}
	.chatType textarea {
		flex: 1;
		border: none;
		overflow: hidden;
		outline: none;
		font-size: 110%;
	}
	.chatType > p {
		position: absolute;
		top: calc(100% + 5px);
		color: white;
		opacity: 0.7;
		left: 50%;
		transform: translateX(-50%);
		font-size: 60%;
	}
	textarea {
		resize: none;
		background: none;
		padding: 7px;
		box-sizing: border-box;
	}
	button {
		border: none;
		background: #0a3;
		color: white;
	}
	button:active {
		filter: brightness(85%);
	}
	.chatBox {
		margin: 27px;
		margin-top: 105px;
		position: fixed;
		height: calc(100% - 135px);
		width: calc(100% - 54px);
		overflow: auto;
		scrollbar-width: none;
		overscroll-behavior: contain;
		display: flex;
		flex-direction: column-reverse;
	}
	.chatBox::-webkit-scrollbar {
		display: none;
	}
	.chatBox > * {
		margin-bottom: 18px;
	}
	.chatBox > div {
		gap: 5px;
	}
	.chatbox > *:last-child {
		margin-top: 40px;
		margin-bottom: 40px;
		color: white;
		text-shadow: 0px 0px 5px black;
		opacity: 0;
		text-align: center;
	}
	.chatbox > *:first-child {
		margin-bottom: 70px;
	}
	.chatBox img {
		width: 20px;
		filter: invert(1);
		flex: 1;
		scale: 0.8;
	}
	.colTheme3 {
		background: #c8ffc8
	}
	.yourChat {
		display: flex;
		flex-direction: column;
	}
	.yourChat > div {
		display: flex;
		gap: 12px;
		justify-content: flex-end;
	}
	.chatTime {
		text-align: right;
		color: white;
		font-weight: 600;
		font-size: 60%;
		text-shadow: 0px 0px 5px black;
	}
	.chatBox div:has(> img) {
		display: flex;
		flex-direction: column;
	}
	.chatBox .colTheme3 {
		padding: 7px;
		border-radius: 9px 9px 0px 9px;
	}
	.chatterName {
		font-weight: 800;
		font-size: 70%;
		margin-bottom: 3px;
	}
	.chatterContent {
		font-size: 90%;
	}
	.theirChat {
		width: 234px;
		display: flex;
		flex-direction: column;
	}
	.theirChat .colTheme1 {
		padding: 7px;
		border-radius: 9px 9px 9px 0px;
	}
	#chatTempYou, #chatTempThem {
		animation: anim 0.05s forwards;
	}
	@keyframes anim {
		0% {display: block}
		100% {display: none}
	}
</style>
<body>
	<img src="images/mountain.jpg">
	<div id="mobileView">
		<div class="header colTheme1">
			<div class="logoContainer">
				<img class="logo" src="images/logo.png">
				<p>Globa</p>
				<p>Chat</p>
			</div>
			<div class="navBar colTheme2">
				<div class="tabHead colTheme1"></div>
				<div class="texTheme1">
					<p>Info</p>
					<p>Chat</p>
					<p>You</p>
					<p>App</p>
				</div>
			</div>
		</div>
		<div class="chatFrame">
			<div class="chatBox">
				<div class="theirChat" id="chatTempThem">
					<div class="colTheme1">
						<p class="chatterName">burgerKing22</p>
						<p class="chatterContent">Good day, everyone! Just asking, you think this app is great for resume. </p>
					</div>
					<p class="chatTime">Today | 4:30am</p>
				</div>
				<div class="yourChat" id="chatTempYou">
					<div>
						<div>
							<img src="icons/edit.svg">
							<img src="icons/delete.svg">
						</div>
						<div class="colTheme3">
							<p class="chatterName">You</p>
							<p class="chatterContent">Good day, everyone! Just asking, you think this app is great for resume. </p>
						</div>
					</div>
					<p class="chatTime">Today | 4:30am</p>
				</div>
				
				<p id="endofmessage">End of message.</p>
			</div>
			<div class="chatType colTheme1">
				<textarea id="chatInput" placeholder="Enter message here..."></textarea>
				<button onclick="send()">
					<img src="icons/send.svg">
					<p>Send</p>
				</button>
				<p id="charSignifier">150 characters left</p>
			</div>
		</div>
	</div>
</body>
<script>
	// INITIALIZATION SETUP
	for (const sheet of document.styleSheets) {
		for (const rule of sheet.cssRules) {
			if (rule.selectorText === ".theirChat") {
				rule.style.width = document.querySelector(".chatBox .colTheme3").clientWidth
			}
		}
	}
	function endVerifier(){
		if(endofmessage.getBoundingClientRect().top <= document.querySelector(".header").clientHeight)
			endofmessage.style.opacity = 0.5
	}
	endVerifier()
	
	chatInput.addEventListener('input', function() {
		syncChatSize();
		charSignifier.innerHTML = (150 - chatInput.value.length) + " characters left"
	});
	
	chatInput.onkeypress = function(ev){
		if(this.value.length >= 150)
			ev.preventDefault()
		if(ev.key == "Enter"){
			ev.preventDefault();
			send();
		}
		syncChatSize();
	}
	
	function syncChatSize(){
		let sendButton = chatInput.parentElement.children[1];
		sendButton.style.height = 0;
		chatInput.style.height = 'auto';
		chatInput.style.height = chatInput.scrollHeight + 'px';
		sendButton.style.height = chatInput.style.height;
	}
	
	function send(){
		if (!chatInput.value.trim()) return
		let content = chatInput.value
		chatInput.value = '';
		syncChatSize();
		charSignifier.innerHTML = (150 - chatInput.value.length) + " characters left"
		addChat(content)
	}
	
	function addChat(content, time, sender){
		if(sender == null){
			if(time == null){
				let elem = document.querySelector(".chatBox").querySelector("#chatTempYou").cloneNode(true)
				elem.setAttribute("id", "")
				elem.querySelector(".chatterContent").innerHTML = content
				elem.querySelector(".chatTime").innerHTML = formatDateTime(new Date(Date.now()))
				document.querySelector(".chatBox").prepend(elem)
			}
		}
		else {
			let elem = document.querySelector(".chatBox").querySelector("#chatTempThem").cloneNode(true)
			elem.setAttribute("id", "")
			elem.querySelector(".chatterContent").innerHTML = content
			elem.querySelector(".chatTime").innerHTML = formatDateTime(new Date(Date.now()))
			document.querySelector(".chatBox").prepend(elem)
		}
		endVerifier()
	}
	
	function formatDateTime(date) {
		const now = new Date();
		
		function formatTime(d) {
			let hours = d.getHours();
			const minutes = d.getMinutes().toString().padStart(2, "0");
			const ampm = hours >= 12 ? "pm" : "am";
			hours = hours % 12 || 12; // convert 0 → 12
			return `${hours}:${minutes} ${ampm}`;
		}
		
		function formatMonthDay(d) {
			const months = [
			  "Jan","Feb","Mar","Apr","May","Jun",
			  "Jul","Aug","Sep","Oct","Nov","Dec"
			];
			return `${months[d.getMonth()]} ${d.getDate()}`;
		}
		
		if (
			date.getFullYear() === now.getFullYear() &&
			date.getMonth() === now.getMonth() &&
			date.getDate() === now.getDate()
		) {
			return `Today | ${formatTime(date)}`;
		}
		
		const yesterday = new Date();
		yesterday.setDate(now.getDate() - 1);
		
		if (
			date.getFullYear() === yesterday.getFullYear() &&
			date.getMonth() === yesterday.getMonth() &&
			date.getDate() === yesterday.getDate()
		) {
			return `Yesterday | ${formatTime(date)}`;
		}

		return `${formatMonthDay(date)} | ${formatTime(date)}`;
	}
</script>
