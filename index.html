<head>
	<title>GlobaChat</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
	@font-face {
		font-family: archivo;
		src: url(font.ttf);
	}
	* {
		margin: 0;
		font-family: archivo;
	}
	body > img {
		filter: blur(12px);
		width: 100%;
		height: 100%;
		object-fit: cover;
		object-position: center;
		scale: 110%;
		z-index: -1;
		position: fixed;
		left: 0%;
	}
	.colTheme1 {
		background: #fff;
	}
	.colTheme2 {
		background: #ddd;
	}
	.texTheme1 {
		color: #333;
	}
	#mobileView > .header {
		border-radius: 0px 0px 20px 20px;
		position: fixed;
		padding: 12px;
		width: 100%;
		box-sizing: border-box;
	}
	#mobileView .logoContainer {
		width: 100%;
		margin-bottom: 12px;
	}
	.logo {
		width: 30px;
		float: left;
		margin-right: 5px;
	}
	.logoContainer {
		display: flex;
		font-weight: bold;
		font-size: 140%;
	}
	.logoContainer p {
		width: min-content;
		float: left;
		display: flex;
		align-items: center;
	}
	.logoContainer p:nth-child(2) {color: #0a4}
	.logoContainer p:last-child {color: #26a}
	.navBar {
		border-radius: 100px;
		padding-top: 5px;
		padding-bottom: 5px;
		position: relative;
	}
	.navBar > div {
		display: flex;
	}
	.navBar > div p {
		flex: 1;
		display: flex;
		justify-content: center;
		font-weight: bold;
		height: auto;
		z-index: 1;
	}
	.tabHead {
		height: 100%;
		position: absolute;
		top: 0%;
		width: 25%;
		left: 25%;
		border-radius: 100px;
		z-index: 0;
		transform: scale(0.9, 0.8);
		transition: left 0.2s;
	}
	.chatType {
		position: fixed;
		bottom: 0%;
		margin: 24px;
		width: calc(100% - 48px);
		display: flex;
		border-radius: 7px;
		align-items: stretch;
	}
	.chatType button {
		width: 60px;
		border-radius: 7px;
		padding: 5px;
		height: 45px;
	}
	.chatType img {
		width: 20px;
		filter: invert(1);
	}
	.chatType textarea {
		flex: 1;
		border: none;
		overflow: hidden;
		outline: none;
		font-size: 104%;
	}
	.chatType > p {
		position: absolute;
		top: calc(100% + 5px);
		color: white;
		opacity: 0.7;
		left: 50%;
		transform: translateX(-50%);
		font-size: 60%;
	}
	textarea {
		resize: none;
		background: none;
		padding: 5px;
		box-sizing: border-box;
	}
	button {
		border: none;
		background: #09f;
		color: white;
	}
	button:active {
		filter: brightness(85%);
	}
</style>
<body>
	<img src="images/mountain.jpg">
	<div id="mobileView">
		<div class="header colTheme1">
			<div class="logoContainer">
				<img class="logo" src="images/logo.png">
				<p>Globa</p>
				<p>Chat</p>
			</div>
			<div class="navBar colTheme2">
				<div class="tabHead colTheme1"></div>
				<div class="texTheme1">
					<p>Info</p>
					<p>Chat</p>
					<p>You</p>
					<p>App</p>
				</div>
			</div>
		</div>
		<div class="chatFrame">
			<div class="chatBox">
			
			</div>
			<div class="chatType colTheme1">
				<textarea id="chatInput" placeholder="Enter message here..."></textarea>
				<button>
					<img src="icons/send.svg">
					<p>Send</p>
				</button>
				<p>150 characters left</p>
			</div>
		</div>
	</div>
</body>
<script>
	chatInput.addEventListener('input', function() {
		let sendButton = this.parentElement.children[1];
		sendButton.style.height = 0;
		this.style.height = 'auto';         // reset height
		this.style.height = this.scrollHeight + 'px';  // grow with content
		sendButton.style.height = this.style.height;
		this.parentElement.children[2].innerHTML = (150 - chatInput.value.length) + " characters left"
	});
	chatInput.onkeypress = function(ev){
		if(this.value.length >= 150)
			ev.preventDefault()
		if(ev.key == "Enter"){
			ev.preventDefault();
			this.value = ''
		}
		let sendButton = this.parentElement.children[1];
		sendButton.style.height = 0;
		this.style.height = 'auto';         // reset height
		this.style.height = this.scrollHeight + 'px';  // grow with content
		sendButton.style.height = this.style.height;
	}
</script>
